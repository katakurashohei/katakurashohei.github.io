---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">
      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
      <!--<h1>{{ post.title }}</h1>-->

      {% if post.image %}
        <img src="{{ site.url }}/images/post_image/{{ post.image }}" />
      {% endif %}

      <div class="entry">
        <p>{{ post.description }}</p>
        <!--{ post.excerpt }}-->
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more"><b>Read More</b></a>
    </article>
  {% endfor %}
</div>
